name: Build

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  # --------------------------------------------------------------------------
  # Test & build on current platform
  # --------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -ldflags="-X main.version=${{ github.ref_name }}" -o ihand .

      - name: Verify --version
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            ./ihand.exe --version
          else
            ./ihand --version
          fi

  # --------------------------------------------------------------------------
  # Cross-compile for all platforms
  # --------------------------------------------------------------------------
  cross-compile:
    name: Cross-compile
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Build all platforms
        run: make build-all VERSION=${{ github.ref_name }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ihand-binaries
          path: dist/
          retention-days: 7

  # --------------------------------------------------------------------------
  # GitHub Release — hanya saat push tag v*
  # --------------------------------------------------------------------------
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: cross-compile
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: ihand-binaries
          path: .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: |
            ## Ihand TUI ${{ github.ref_name }}

            ### 📦 Binary

            | Platform | File |
            |----------|------|
            | Windows (amd64) | `ihand-windows-amd64.exe` |
            | macOS (Intel) | `ihand-darwin-amd64` |
            | macOS (Apple Silicon) | `ihand-darwin-arm64` |
            | Linux (amd64) | `ihand-linux-amd64` |
            | Linux (arm64) | `ihand-linux-arm64` |

            ### ⚡ Quick Install

            ```bash
            # macOS / Linux
            curl -fsSL https://raw.githubusercontent.com/bachtiarpanjaitan/ihandtui/main/scripts/install-remote.sh | bash
            ```

            ### 🔨 Manual Install

            Download binary di atas, rename ke `ihand`, taruh di PATH.
          files: dist/*
          generate_release_notes: true

name: Build

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # --------------------------------------------------------------------------
  # Test & build on current platform
  # --------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Build
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            go build -ldflags="-X main.version=${{ github.ref_name }}" -o ihand.exe .
          else
            go build -ldflags="-X main.version=${{ github.ref_name }}" -o ihand .
          fi

      - name: Verify --version
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            ./ihand.exe --version
          else
            ./ihand --version
          fi

  # --------------------------------------------------------------------------
  # Cross-compile for all platforms
  # --------------------------------------------------------------------------
  cross-compile:
    name: Cross-compile
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Build all platforms
        run: make build-all VERSION=${{ github.ref_name }}

      - name: Package installers
        shell: bash
        run: |
          mkdir -p packages
          VERSION="${{ github.ref_name }}"

          # Windows — zip with install script
          cp dist/ihand-windows-amd64.exe ihand.exe
          zip packages/ihand-${VERSION}-windows-amd64.zip ihand.exe scripts/install.ps1
          rm ihand.exe

          # macOS Intel — tar.gz
          cp dist/ihand-darwin-amd64 ihand
          tar czf packages/ihand-${VERSION}-darwin-amd64.tar.gz ihand scripts/install.sh
          rm ihand

          # macOS Apple Silicon — tar.gz
          cp dist/ihand-darwin-arm64 ihand
          tar czf packages/ihand-${VERSION}-darwin-arm64.tar.gz ihand scripts/install.sh
          rm ihand

          # Linux amd64 — tar.gz
          cp dist/ihand-linux-amd64 ihand
          tar czf packages/ihand-${VERSION}-linux-amd64.tar.gz ihand scripts/install.sh
          rm ihand

          # Linux arm64 — tar.gz
          cp dist/ihand-linux-arm64 ihand
          tar czf packages/ihand-${VERSION}-linux-arm64.tar.gz ihand scripts/install.sh
          rm ihand

          echo "📦 Packages:"
          ls -lh packages/

      - name: Upload packages (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: ihand-packages
          path: packages/*
          retention-days: 7

      - name: Upload raw binaries (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: ihand-binaries
          path: dist/
          retention-days: 7

  # --------------------------------------------------------------------------
  # GitHub Release — hanya saat push tag v*
  # --------------------------------------------------------------------------
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: cross-compile
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: ihand-packages
          path: packages

      - name: Download raw binaries
        uses: actions/download-artifact@v4
        with:
          name: ihand-binaries
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: |
            ## Ihand TUI ${{ github.ref_name }}

            ### 📦 Download & Install

            | Platform | Package |
            |----------|---------|
            | 🪟 Windows | `ihand-${{ github.ref_name }}-windows-amd64.zip` |
            | 🍎 macOS Intel | `ihand-${{ github.ref_name }}-darwin-amd64.tar.gz` |
            | 🍎 macOS Apple Silicon | `ihand-${{ github.ref_name }}-darwin-arm64.tar.gz` |
            | 🐧 Linux amd64 | `ihand-${{ github.ref_name }}-linux-amd64.tar.gz` |
            | 🐧 Linux arm64 | `ihand-${{ github.ref_name }}-linux-arm64.tar.gz` |

            ### ⚡ Quick Install (curl)

            ```bash
            curl -fsSL https://raw.githubusercontent.com/bachtiarpanjaitan/ihand-tui/master/scripts/install-remote.sh | bash
            ```

            ### 🔨 Manual Install

            1. Download package sesuai platform
            2. Ekstrak — berisi binary `ihand` + install script
            3. Jalankan `bash install.sh` (macOS/Linux) atau `powershell -File install.ps1` (Windows)
          files: |
            packages/*
            dist/*
          generate_release_notes: true
